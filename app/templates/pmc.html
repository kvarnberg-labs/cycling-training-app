<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #e2e8f0; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; }
        .btn { padding: 0.5rem 1.25rem; border-radius: 8px; font-weight: 600; font-size: 0.875rem; cursor: pointer; border: none; }
        .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .btn-ghost:hover { background: #1e293b; }
        [x-cloak] { display: none !important; }
        canvas { max-height: 500px; }
    </style>
</head>
<body x-data="pmcApp()" x-init="init()" class="min-h-screen">
    <nav class="border-b border-slate-700/50 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
            <a href="/" class="text-lg font-bold tracking-tight"><span class="text-cyan-400">&#x1F6B2;</span> CycleTrain</a>
            <div class="flex gap-2">
                <a href="/" class="btn btn-ghost text-xs">Dashboard</a>
                <a href="/calendar" class="btn btn-ghost text-xs">Calendar</a>
                <a href="/settings" class="btn btn-ghost text-xs">Settings</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold">Performance Management Chart</h1>
            <select x-model="days" @change="loadPMC()" class="w-auto text-sm">
                <option value="30">30 days</option>
                <option value="90" selected>90 days</option>
                <option value="180">180 days</option>
                <option value="365">365 days</option>
            </select>
        </div>

        <!-- Legend -->
        <div class="flex gap-6 mb-4 text-sm">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-cyan-400"></span>
                <span>CTL (Fitness)</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-rose-400"></span>
                <span>ATL (Fatigue)</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-emerald-400"></span>
                <span>TSB (Form)</span>
            </div>
        </div>

        <!-- Chart -->
        <div class="card">
            <canvas id="pmcChart"></canvas>
        </div>

        <!-- Current values -->
        <div class="grid grid-cols-3 gap-3 mt-4">
            <div class="card text-center">
                <div class="text-xs text-slate-400">Current CTL</div>
                <div class="text-2xl font-bold text-cyan-400" x-text="currentCtl.toFixed(1)">0</div>
            </div>
            <div class="card text-center">
                <div class="text-xs text-slate-400">Current ATL</div>
                <div class="text-2xl font-bold text-rose-400" x-text="currentAtl.toFixed(1)">0</div>
            </div>
            <div class="card text-center">
                <div class="text-xs text-slate-400">Current TSB</div>
                <div class="text-2xl font-bold" :class="currentTsb >= 0 ? 'text-emerald-400' : 'text-orange-400'" x-text="(currentTsb >= 0 ? '+' : '') + currentTsb.toFixed(1)">0</div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script>
        function pmcApp() {
            return {
                days: 90,
                currentCtl: 0,
                currentAtl: 0,
                currentTsb: 0,
                chart: null,
                async init() {
                    await this.loadPMC();
                },
                async loadPMC() {
                    try {
                        const res = await fetch('/api/dashboard/pmc?days=' + this.days);
                        if (!res.ok) return;
                        const data = await res.json();
                        this.renderChart(data.data || []);
                    } catch(e) {}
                },
                renderChart(data) {
                    if (data.length === 0) return;
                    const labels = data.map(d => {
                        const dt = new Date(d.date + 'T00:00:00');
                        return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    });
                    const ctlData = data.map(d => d.ctl);
                    const atlData = data.map(d => d.atl);
                    const tsbData = data.map(d => d.tsb);

                    this.currentCtl = ctlData[ctlData.length - 1] || 0;
                    this.currentAtl = atlData[atlData.length - 1] || 0;
                    this.currentTsb = tsbData[tsbData.length - 1] || 0;

                    if (this.chart) this.chart.destroy();

                    const ctx = document.getElementById('pmcChart').getContext('2d');
                    this.chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [
                                {
                                    label: 'CTL (Fitness)',
                                    data: ctlData,
                                    borderColor: '#22d3ee',
                                    backgroundColor: 'rgba(34, 211, 238, 0.1)',
                                    fill: false,
                                    tension: 0.4,
                                    pointRadius: 0,
                                    borderWidth: 2,
                                },
                                {
                                    label: 'ATL (Fatigue)',
                                    data: atlData,
                                    borderColor: '#fb7185',
                                    backgroundColor: 'rgba(251, 113, 133, 0.1)',
                                    fill: false,
                                    tension: 0.4,
                                    pointRadius: 0,
                                    borderWidth: 2,
                                },
                                {
                                    label: 'TSB (Form)',
                                    data: tsbData,
                                    borderColor: '#34d399',
                                    backgroundColor: 'rgba(52, 211, 153, 0.1)',
                                    fill: true,
                                    tension: 0.4,
                                    pointRadius: 0,
                                    borderWidth: 2,
                                },
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: {
                                intersect: false,
                                mode: 'index',
                            },
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: '#1e293b',
                                    titleColor: '#e2e8f0',
                                    bodyColor: '#94a3b8',
                                    borderColor: '#334155',
                                    borderWidth: 1,
                                    padding: 12,
                                    callbacks: {
                                        label: context => context.dataset.label + ': ' + context.parsed.y.toFixed(1)
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    grid: { color: 'rgba(51, 65, 85, 0.5)', tickLength: 8 },
                                    ticks: { color: '#64748b', maxTicksLimit: 12 }
                                },
                                y: {
                                    grid: { color: 'rgba(51, 65, 85, 0.5)' },
                                    ticks: { color: '#64748b' },
                                    beginAtZero: true,
                                }
                            }
                        }
                    });
                }
            }
        }
    </script>
</body>
</html>
