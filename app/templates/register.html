<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #e2e8f0; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 2rem; }
        input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 0.7rem 0.85rem; color: #e2e8f0; width: 100%; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
        .btn { padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; border: none; }
        .btn-primary { background: #3b82f6; color: white; width: 100%; }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg { color: #f87171; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
        @media (max-width: 640px) { .card { padding: 1.5rem; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="text-4xl mb-2">&#x1F6B2;</div>
            <h1 class="text-2xl font-bold tracking-tight">CycleTrain</h1>
            <p class="text-slate-400 text-sm mt-1">Create your training account</p>
        </div>
        <div class="card">
            <div id="error-message" class="error-msg"></div>
            <form id="register-form" onsubmit="return handleRegister(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Name (optional)</label>
                    <input type="text" id="name" placeholder="Your name">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">FTP (watts, optional)</label>
                    <input type="number" id="ftp" placeholder="200" value="200">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-300 mb-1.5">Weight (kg, optional)</label>
                    <input type="number" id="weight" placeholder="75" value="75" step="0.1">
                </div>
                <button type="submit" id="register-btn" class="btn btn-primary">Create Account</button>
            </form>
            <div class="mt-4 text-center text-sm text-slate-400">
                Already have an account?
                <a href="/api/auth/login" class="text-cyan-400 hover:text-cyan-300 font-medium">Sign in</a>
            </div>
        </div>
    </div>
    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const errEl = document.getElementById('error-message');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            errEl.style.display = 'none';
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value || undefined,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        ftp: parseInt(document.getElementById('ftp').value) || 200,
                        weight_kg: parseFloat(document.getElementById('weight').value) || 75,
                    }),
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || 'Registration failed');
                }
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                window.location.href = '/';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }
    </script>
</body>
</html>
