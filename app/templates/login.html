<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #e2e8f0; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 2rem; }
        .btn { padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer; border: none; }
        .btn-primary { background: #3b82f6; color: white; width: 100%; }
        .btn-primary:hover { background: #2563eb; }
        input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 0.75rem; color: #e2e8f0; width: 100%; }
        input:focus { outline: none; border-color: #3b82f6; }
        [x-cloak] { display: none !important; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body x-data="authApp()" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="text-4xl mb-2">&#x1F6B2;</div>
            <h1 class="text-2xl font-bold">CycleTrain</h1>
            <p class="text-slate-400 text-sm mt-1">Your personal cycling training companion</p>
        </div>

        <div class="card">
            <!-- Tabs -->
            <div class="flex border-b border-slate-700 mb-6">
                <button @click="tab='login'" class="flex-1 pb-3 text-sm font-medium text-center" :class="tab==='login' ? 'tab-active text-cyan-400' : 'text-slate-400'">Sign In</button>
                <button @click="tab='register'" class="flex-1 pb-3 text-sm font-medium text-center" :class="tab==='register' ? 'tab-active text-cyan-400' : 'text-slate-400'">Register</button>
            </div>

            <!-- Login Form -->
            <form x-show="tab==='login'" @submit.prevent="login()" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-300 mb-1">Email</label>
                    <input type="email" x-model="loginEmail" placeholder="you@example.com" required>
                </div>
                <div>
                    <label class="block text-sm text-slate-300 mb-1">Password</label>
                    <input type="password" x-model="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" x-text="loggingIn ? 'Signing in...' : 'Sign In'"></button>
                <div x-show="loginError" class="text-sm text-red-400 text-center" x-text="loginError"></div>
            </form>

            <!-- Register Form -->
            <form x-show="tab==='register'" @submit.prevent="register()" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-300 mb-1">Name</label>
                    <input type="text" x-model="regName" placeholder="Your name" required>
                </div>
                <div>
                    <label class="block text-sm text-slate-300 mb-1">Email</label>
                    <input type="email" x-model="regEmail" placeholder="you@example.com" required>
                </div>
                <div>
                    <label class="block text-sm text-slate-300 mb-1">Password</label>
                    <input type="password" x-model="regPassword" placeholder="At least 8 characters" required minlength="8">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm text-slate-300 mb-1">FTP (watts)</label>
                        <input type="number" x-model="regFtp" placeholder="200">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-300 mb-1">Weight (kg)</label>
                        <input type="number" step="0.1" x-model="regWeight" placeholder="75">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" x-text="registering ? 'Creating account...' : 'Create Account'"></button>
                <div x-show="registerError" class="text-sm text-red-400 text-center" x-text="registerError"></div>
                <div x-show="registerSuccess" class="text-sm text-emerald-400 text-center">Account created! Redirecting...</div>
            </form>
        </div>

        <p class="text-center text-xs text-slate-600 mt-6">Free &amp; open source. Your data stays yours.</p>
    </div>

    <script>
        function authApp() {
            return {
                tab: 'login',
                loginEmail: '',
                loginPassword: '',
                loggingIn: false,
                loginError: '',
                regName: '',
                regEmail: '',
                regPassword: '',
                regFtp: 200,
                regWeight: 75,
                registering: false,
                registerError: '',
                registerSuccess: false,

                async login() {
                    this.loggingIn = true;
                    this.loginError = '';
                    try {
                        const res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: this.loginEmail, password: this.loginPassword }),
                        });
                        const data = await res.json();
                        if (res.ok) {
                            localStorage.setItem('token', data.access_token);
                            window.location.href = '/';
                        } else {
                            this.loginError = data.detail || 'Login failed';
                        }
                    } catch(e) { this.loginError = 'Connection error'; }
                    this.loggingIn = false;
                },

                async register() {
                    this.registering = true;
                    this.registerError = '';
                    try {
                        const res = await fetch('/api/auth/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: this.regName,
                                email: this.regEmail,
                                password: this.regPassword,
                                ftp: parseInt(this.regFtp) || 200,
                                weight_kg: parseFloat(this.regWeight) || 75,
                            }),
                        });
                        const data = await res.json();
                        if (res.ok) {
                            localStorage.setItem('token', data.access_token);
                            this.registerSuccess = true;
                            setTimeout(() => window.location.href = '/', 1000);
                        } else {
                            this.registerError = data.detail || 'Registration failed';
                        }
                    } catch(e) { this.registerError = 'Connection error'; }
                    this.registering = false;
                }
            }
        }
    </script>
</body>
</html>
