<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #e2e8f0; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; }
        .btn { padding: 0.5rem 1.25rem; border-radius: 8px; font-weight: 600; font-size: 0.875rem; cursor: pointer; transition: all 0.15s; border: none; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .btn-ghost:hover { background: #1e293b; }
        [x-cloak] { display: none !important; }
        .day-cell { min-height: 120px; }
        @media (max-width: 640px) { .day-cell { min-height: 80px; } .card { padding: 1rem; } }
        .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
    </style>
</head>
<body x-data="calendarApp()" x-init="init()" class="min-h-screen">
    <nav class="border-b border-slate-700/50 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
            <a href="/" class="text-lg font-bold tracking-tight"><span class="text-cyan-400">&#x1F6B2;</span> CycleTrain</a>
            <div class="flex gap-2">
                <a href="/" class="btn btn-ghost text-xs">Dashboard</a>
                <a href="/pmc" class="btn btn-ghost text-xs">PMC</a>
                <a href="/settings" class="btn btn-ghost text-xs">Settings</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold">Training Calendar</h1>
            <div class="flex gap-2">
                <button @click="prevWeek()" class="btn btn-ghost text-xs">&larr; Prev</button>
                <span class="text-sm text-slate-400 py-2" x-text="weekLabel"></span>
                <button @click="nextWeek()" class="btn btn-ghost text-xs">Next &rarr;</button>
                <button @click="generateWeek()" class="btn btn-primary text-xs" :disabled="generating" x-text="generating ? '...' : 'Generate'"></button>
            </div>
        </div>

        <!-- Calendar grid -->
        <div class="card !p-0 overflow-hidden">
            <div class="grid grid-cols-7 border-b border-slate-700/50">
                <template x-for="day in ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']" :key="day">
                    <div class="text-center text-xs font-semibold text-slate-400 py-2 border-r border-slate-700/50 last:border-r-0" x-text="day"></div>
                </template>
            </div>
            <div class="grid grid-cols-7">
                <template x-for="day in days" :key="day.date">
                    <div class="day-cell p-1.5 sm:p-2 border-r border-b border-slate-700/50" :class="day.isToday ? 'bg-blue-900/20' : ''">
                        <div class="flex items-center justify-between mb-1">
                            <div class="text-xs font-medium" :class="day.isToday ? 'text-cyan-400' : 'text-slate-500'" x-text="day.dayNum"></div>
                            <template x-if="day.weather">
                                <span class="text-xs" :title="day.weather.label + (day.weather.indoor_suitable ? ' — indoor recommended' : '')" x-text="day.weather.icon"></span>
                            </template>
                        </div>
                        <template x-for="w in day.workouts" :key="w.id">
                            <div class="text-xs p-1 mb-0.5 rounded bg-slate-800 cursor-pointer hover:bg-slate-700 truncate" :title="w.title + ' - ' + (w.duration_minutes || '?') + 'min'">
                                <div class="flex items-center gap-1">
                                    <span class="w-1.5 h-1.5 rounded-full shrink-0" :class="'bg-' + (w.workout_type || 'endurance') + '-400'"></span>
                                    <span x-text="w.title"></span>
                                    <span x-show="w.is_indoor" class="text-[10px] ml-auto" title="Indoor workout">🏠</span>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </div>

        <!-- Selected day details -->
        <div x-show="selectedDay" class="card mt-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-semibold" x-text="selectedDay ? selectedDay.day_name + ' ' + selectedDay.date : ''"></h2>
                <button @click="selectedDay = null" class="btn btn-ghost text-xs">Close</button>
            </div>
            <template x-for="w in (selectedDay ? selectedDay.workouts : [])" :key="w.id">
                <div class="p-3 bg-slate-800/50 rounded-lg mb-2 flex items-start justify-between">
                    <div>
                        <div class="font-semibold text-sm" x-text="w.title"></div>
                        <div class="text-xs text-slate-400 mt-0.5">
                            <span x-text="w.workout_type"></span>
                            <span x-show="w.duration_minutes"> &middot; <span x-text="w.duration_minutes + 'min'"></span></span>
                            <span x-show="w.target_power_zone"> &middot; <span x-text="w.target_power_zone"></span></span>
                        </div>
                        <p x-show="w.description" class="text-xs text-slate-500 mt-1" x-text="w.description"></p>
                    </div>
                    <div class="flex gap-1 shrink-0">
                        <button @click="updateStatus(w.id, 'accepted')" x-show="w.status === 'suggested'" class="btn btn-primary text-xs px-2 py-1">Accept</button>
                        <button @click="updateStatus(w.id, 'completed')" x-show="w.status === 'accepted'" class="btn btn-primary text-xs px-2 py-1">Done</button>
                        <button @click="updateStatus(w.id, 'skipped')" x-show="w.status !== 'completed'" class="btn btn-ghost text-xs px-2 py-1">Skip</button>
                    </div>
                </div>
            </template>
            <div x-show="selectedDay && selectedDay.workouts.length === 0" class="text-center py-6 text-slate-500 text-sm">Rest day — no workouts scheduled.</div>
        </div>
    </main>

    <script>
        function calendarApp() {
            return {
                days: [],
                weekStart: null,
                selectedDay: null,
                generating: false,
                weekLabel: '',
                init() {
                    const d = new Date();
                    const day = d.getDay();
                    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                    this.weekStart = new Date(d.setDate(diff));
                    this.weekStart.setHours(0,0,0,0);
                    this.loadWeek();
                },
                formatDateStr(date) {
                    return date.toISOString().split('T')[0];
                },
                async loadWeek() {
                    const startStr = this.formatDateStr(this.weekStart);
                    const end = new Date(this.weekStart);
                    end.setDate(end.getDate() + 6);
                    const weekEndStr = this.formatDateStr(end);
                    this.weekLabel = this.weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' - ' + end.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

                    try {
                        const res = await fetch('/api/dashboard/calendar?week_start=' + startStr);
                        if (!res.ok) return;
                        const data = await res.json();
                        const todayStr = new Date().toISOString().split('T')[0];
                        this.days = (data.days || []).map(d => ({
                            ...d,
                            dayNum: new Date(d.date + 'T00:00:00').getDate(),
                            isToday: d.date === todayStr,
                        }));
                        // Refresh selectedDay if open
                        if (this.selectedDay) {
                            this.selectedDay = this.days.find(d => d.date === this.selectedDay.date) || null;
                        }
                    } catch(e) {}
                },
                prevWeek() {
                    this.weekStart.setDate(this.weekStart.getDate() - 7);
                    this.loadWeek();
                },
                nextWeek() {
                    this.weekStart.setDate(this.weekStart.getDate() + 7);
                    this.loadWeek();
                },
                async generateWeek() {
                    this.generating = true;
                    const startStr = this.formatDateStr(this.weekStart);
                    try {
                        await fetch('/api/workouts/generate-week?week_start=' + startStr, { method: 'POST' });
                        await this.loadWeek();
                    } catch(e) {}
                    this.generating = false;
                },
                async updateStatus(id, status) {
                    const endpoints = { accepted: '/accept', completed: '/complete', skipped: '/skip' };
                    try {
                        await fetch('/api/workouts/' + id + endpoints[status], { method: 'PUT' });
                        await this.loadWeek();
                    } catch(e) {}
                }
            }
        }
    </script>
</body>
</html>
