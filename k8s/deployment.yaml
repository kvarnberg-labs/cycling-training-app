apiVersion: apps/v1
kind: Deployment
metadata:
  name: cycling-training-app
  namespace: cycling-training-app
  labels:
    app: cycling-training-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cycling-training-app
  template:
    metadata:
      labels:
        app: cycling-training-app
    spec:
      imagePullSecrets:
        - name: forgejo-registry-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: app
          image: forgejo.lan/kvarnberg/cycling-training-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cycling-training-app-config
            - secretRef:
                name: cycling-training-app-secrets
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cycling-training-app-secrets
                  key: LLM_API_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cycling-training-app-data
