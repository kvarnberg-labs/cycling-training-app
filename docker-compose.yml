version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/cycling_trainer.db
    volumes:
      - ./.env:/app/.env:ro
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Optional PostgreSQL ────────────────────────────────────
  # Uncomment the lines below to use PostgreSQL instead of SQLite.
  # Then update DATABASE_URL in .env to:
  #   DATABASE_URL=postgresql://cycling_app:cycling_app_secret@db:5432/cycling_training
  #
  # db:
  #   image: postgres:16
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: cycling_app
  #     POSTGRES_PASSWORD: cycling_app_secret
  #     POSTGRES_DB: cycling_training
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U cycling_app -d cycling_training"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

volumes:
  postgres_data:
  sqlite_data:
